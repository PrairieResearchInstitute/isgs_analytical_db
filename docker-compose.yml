services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: idot
      POSTGRES_USER: idot
      POSTGRES_PASSWORD: idot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idot -d idot"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: seeder
    environment:
      DATABASE_URL: postgresql://idot:idot@postgres:5432/idot
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      DATABASE_URL: postgresql://idot:idot@postgres:5432/idot
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
      - "3000:3000"
    depends_on:
      seed:
        condition: service_completed_successfully

  rustfs:
    image: rustfs/rustfs
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_ALLOW_INSECURE_DEFAULT_CREDENTIALS: "true"
    volumes:
      - rustfs_data:/data
    ports:
      - "${RUSTFS_HOST_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rustfs_data: