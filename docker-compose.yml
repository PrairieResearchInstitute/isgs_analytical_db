services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: idot
      POSTGRES_USER: idot
      POSTGRES_PASSWORD: idot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idot -d idot"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: seeder
    environment:
      DATABASE_URL: postgresql://idot:idot@postgres:5432/idot
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      DATABASE_URL: postgresql://idot:idot@postgres:5432/idot
    ports:
      - "3000:3000"
    depends_on:
      seed:
        condition: service_completed_successfully

volumes:
  postgres_data: